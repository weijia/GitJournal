plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('secrets/key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
if (!keystoreProperties.containsKey('keyAlias')) {
    // to simplify local development
    keystoreProperties['keyAlias'] = 'local'
    keystoreProperties['keyPassword'] = 'local'
    keystoreProperties['storeFile'] = 'local'
    keystoreProperties['storePassword'] = 'local'
}

android {
    namespace 'io.gitjournal.gitjournal'
    compileSdkVersion flutter.compileSdkVersion

    lintOptions {
        disable 'InvalidPackage'
        checkReleaseBuilds false
    }

    defaultConfig {
        applicationId "io.gitjournal.gitjournal"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        // testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    flavorDimensions "app"
    productFlavors {
        prod {
            dimension "app"
        }
        dev {
            dimension "app"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
        }
    }

    signingConfigs {
        release {
            // Try environment variables first (for CI), then keystore.properties, then debug fallback
            def releaseKeystorePath = 'release-keystore.jks'
            def releaseKeystoreFile = rootProject.file(releaseKeystorePath)
            def debugKeystorePath = 'debug-keystore.jks'
            def debugKeystoreFile = rootProject.file(debugKeystorePath)
            
            if (releaseKeystoreFile.exists() && releaseKeystoreFile.length() > 0) {
                // Use release keystore
                storeFile releaseKeystoreFile
                storePassword System.getenv('RELEASE_KEYSTORE_PASSWORD') ?: keystoreProperties['storePassword']
                keyAlias System.getenv('RELEASE_KEY_ALIAS') ?: keystoreProperties['keyAlias']
                keyPassword System.getenv('RELEASE_KEY_PASSWORD') ?: keystoreProperties['keyPassword']
            } else if (debugKeystoreFile.exists()) {
                // Fallback to debug keystore
                println "Warning: Release keystore not found, using debug keystore"
                storeFile debugKeystoreFile
                storePassword System.getenv('DEBUG_KEYSTORE_PASSWORD') ?: 'gitjournal-debug-pass'
                keyAlias System.getenv('DEBUG_KEY_ALIAS') ?: 'gitjournal-debug'
                keyPassword System.getenv('DEBUG_KEY_PASSWORD') ?: 'gitjournal-debug-pass'
            } else {
                // Last resort: use local.properties
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
        debug {
            def debugKeystorePath = 'debug-keystore.jks'
            def debugKeystoreFile = rootProject.file(debugKeystorePath)
            if (debugKeystoreFile.exists()) {
                storeFile debugKeystoreFile
                storePassword System.getenv('DEBUG_KEYSTORE_PASSWORD') ?: 'gitjournal-debug-pass'
                keyAlias System.getenv('DEBUG_KEY_ALIAS') ?: 'gitjournal-debug'
                keyPassword System.getenv('DEBUG_KEY_PASSWORD') ?: 'gitjournal-debug-pass'
            }
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            ndk {
                abiFilters 'arm64-v8a', 'armeabi-v7a'
            }
        }
        debug {
            signingConfig signingConfigs.debug
            ndk {
                abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64'
            }
        }
    }

    dexOptions {
        preDexLibraries true
        jumboMode true
        javaMaxHeapSize "12g"
    }
}

flutter {
    source '../..'
}

