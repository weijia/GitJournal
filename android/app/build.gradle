plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('secrets/key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
if (!keystoreProperties.containsKey('keyAlias')) {
    // to simplify local development
    keystoreProperties['keyAlias'] = 'local'
    keystoreProperties['keyPassword'] = 'local'
    keystoreProperties['storeFile'] = 'local'
    keystoreProperties['storePassword'] = 'local'
}

android {
    namespace 'io.gitjournal.gitjournal'
    compileSdkVersion flutter.compileSdkVersion

    lintOptions {
        disable 'InvalidPackage'
        checkReleaseBuilds false
    }

    defaultConfig {
        applicationId "io.gitjournal.gitjournal"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        // testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    flavorDimensions "app"
    productFlavors {
        prod {
            dimension "app"
        }
        dev {
            dimension "app"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
        }
    }

    signingConfigs {
        debug {
            def debugKeystorePath = 'debug-keystore.jks'
            def debugKeystoreFile = rootProject.file(debugKeystorePath)
            if (debugKeystoreFile.exists()) {
                storeFile debugKeystoreFile
                storePassword System.getenv('DEBUG_KEYSTORE_PASSWORD') ?: 'gitjournal-debug-pass'
                keyAlias System.getenv('DEBUG_KEY_ALIAS') ?: 'gitjournal-debug'
                keyPassword System.getenv('DEBUG_KEY_PASSWORD') ?: 'gitjournal-debug-pass'
            }
        }
        // release uses same config as debug for CI builds
        // this allows OTA updates without managing release keys
        release {
            initWith debug
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            ndk {
                abiFilters 'arm64-v8a', 'armeabi-v7a'
            }
        }
        debug {
            signingConfig signingConfigs.debug
            ndk {
                abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64'
            }
        }
    }

    dexOptions {
        preDexLibraries true
        jumboMode true
    }

    packagingOptions {
        pickFirst '**/libgo_git_dart.so'
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
}
