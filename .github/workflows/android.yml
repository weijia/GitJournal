name: Android
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  GO_VERSION: '1.21'
  # Use the forked go_git_dart with malformed mode fix
  GO_GIT_DART_REPO: 'weijia/go_git_dart'

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Give more Disk Space
        run: sudo rm -rf /usr/share/dotnet

      - name: Checkout GitJournal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Get Flutter version from pubspec
        run: |
          set -e
          FLUTTER_VERSION=$(cat pubspec.yaml | grep 'flutter:' | head -n 1 | awk '{ print $2 }' | tr -d '"' | cut -d "=" -f 2)
          echo "FLUTTER_VERSION=${FLUTTER_VERSION}" >> $GITHUB_ENV
          echo "Detected Flutter version: ${FLUTTER_VERSION}"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Env
        run: dart ./scripts/setup_env.dart

      - name: Verify go_git_dart dependency
        run: dart ./scripts/verify_go_git_dart.dart

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Get Flutter Deps
        run: flutter pub get --suppress-analytics

      # ============================================
      # Build custom go_git_dart with malformed mode fix
      # ============================================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Checkout forked go_git_dart
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GO_GIT_DART_REPO }}
          path: go_git_dart_fork
          fetch-depth: 0

      - name: Build go_git_dart Android binaries
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -eux
          echo "=== Building go_git_dart Android binaries ==="
          echo "NDK Path: $ANDROID_NDK_HOME"
          echo "Go version: $(go version)"
          
          cd go_git_dart_fork/src
          
          # Verify NDK toolchain exists
          NDK_TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          if [ ! -d "$NDK_TOOLCHAIN" ]; then
            echo "ERROR: NDK toolchain not found at $NDK_TOOLCHAIN"
            ls -la $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/ || true
            exit 1
          fi
          
          # Create output directories
          mkdir -p ../android/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86,x86_64}
          
          # Common settings
          export GOOS=android
          export CGO_ENABLED=1
          ANDROID_SDK_VERSION=21
          
          # Build for arm64-v8a
          echo "Building for arm64-v8a..."
          export GOARCH=arm64
          export CC="$NDK_TOOLCHAIN/bin/aarch64-linux-android${ANDROID_SDK_VERSION}-clang"
          export CXX="$NDK_TOOLCHAIN/bin/aarch64-linux-android${ANDROID_SDK_VERSION}-clang++"
          go build -buildmode=c-shared -trimpath -o ../android/src/main/jniLibs/arm64-v8a/go_git_dart.so .
          
          # Build for armeabi-v7a
          echo "Building for armeabi-v7a..."
          export GOARCH=arm
          export CC="$NDK_TOOLCHAIN/bin/armv7a-linux-androideabi${ANDROID_SDK_VERSION}-clang"
          export CXX="$NDK_TOOLCHAIN/bin/armv7a-linux-androideabi${ANDROID_SDK_VERSION}-clang++"
          go build -buildmode=c-shared -trimpath -o ../android/src/main/jniLibs/armeabi-v7a/go_git_dart.so .
          
          # Build for x86
          echo "Building for x86..."
          export GOARCH=386
          export CC="$NDK_TOOLCHAIN/bin/i686-linux-android${ANDROID_SDK_VERSION}-clang"
          export CXX="$NDK_TOOLCHAIN/bin/i686-linux-android${ANDROID_SDK_VERSION}-clang++"
          go build -buildmode=c-shared -trimpath -o ../android/src/main/jniLibs/x86/go_git_dart.so .
          
          # Build for x86_64
          echo "Building for x86_64..."
          export GOARCH=amd64
          export CC="$NDK_TOOLCHAIN/bin/x86_64-linux-android${ANDROID_SDK_VERSION}-clang"
          export CXX="$NDK_TOOLCHAIN/bin/x86_64-linux-android${ANDROID_SDK_VERSION}-clang++"
          go build -buildmode=c-shared -trimpath -o ../android/src/main/jniLibs/x86_64/go_git_dart.so .
          
          echo "=== Build complete ==="
          find ../android/src/main/jniLibs -name "*.so" -exec ls -lh {} \;

      - name: Replace go_git_dart binaries in Flutter cache
        run: |
          echo "=== Replacing go_git_dart binaries ==="
          
          # Find the cached go_git_dart package
          PUB_CACHE=$(flutter pub cache list 2>/dev/null | grep -A5 "go_git_dart" | grep "location:" | head -1 | awk '{print $2}' || echo "")
          
          if [ -z "$PUB_CACHE" ]; then
            # Try to find in standard pub cache location
            PUB_CACHE="$HOME/.pub-cache/git/go_git_dart"
          fi
          
          echo "Pub cache location: $PUB_CACHE"
          
          # Replace the jniLibs with our custom built ones
          if [ -d "$PUB_CACHE/android/src/main/jniLibs" ]; then
            echo "Replacing binaries in pub cache..."
            rm -rf "$PUB_CACHE/android/src/main/jniLibs"
            cp -r go_git_dart_fork/android/src/main/jniLibs "$PUB_CACHE/android/src/main/"
          fi
          
          # Also replace in the current project's .dart_tool
          if [ -d ".dart_tool/pub-cache/git/go_git_dart" ]; then
            echo "Replacing binaries in .dart_tool..."
            rm -rf ".dart_tool/pub-cache/git/go_git_dart/android/src/main/jniLibs"
            cp -r go_git_dart_fork/android/src/main/jniLibs ".dart_tool/pub-cache/git/go_git_dart/android/src/main/"
          fi
          
          echo "=== Replacement complete ==="

      - name: Build APK (debug - no signing key needed)
        run: |
          set -eux
          BUILD_NUM=$(git rev-list --count HEAD)
          echo "Build Number: $BUILD_NUM"

          flutter clean
          flutter pub get
          
          # Re-replace binaries after flutter clean
          if [ -d "go_git_dart_fork/android/src/main/jniLibs" ]; then
            PUB_CACHE_DIR=$(find .dart_tool -type d -name "go_git_dart" 2>/dev/null | head -1)
            if [ -n "$PUB_CACHE_DIR" ]; then
              rm -rf "$PUB_CACHE_DIR/android/src/main/jniLibs"
              cp -r go_git_dart_fork/android/src/main/jniLibs "$PUB_CACHE_DIR/android/src/main/"
            fi
          fi

          # 使用 debug 模式构建（不需要签名密钥）
          flutter build apk --debug --flavor dev \
            --build-number="$BUILD_NUM"

      - name: Verify APK Contents
        run: |
          echo "=== Verifying APK contents ==="
          APK_DIR="build/app/outputs/flutter-apk"
          ls -la $APK_DIR/

          for apk in $APK_DIR/*.apk; do
            echo "--- Checking: $apk ---"
            unzip -l "$apk" | grep -E "(libgo_git_dart|lib/arm)" || echo "Checking for go_git_dart lib..."
            unzip -l "$apk" | grep "go_git_dart" && echo "✓ go_git_dart found in APK" || echo "⚠ go_git_dart not found (may be bundled differently)"
          done

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitJournal-Debug-APK
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30
