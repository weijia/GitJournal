name: Android
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Give more Disk Space
        run: sudo rm -rf /usr/share/dotnet

      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Get Flutter version from pubspec
        run: |
          set -e
          FLUTTER_VERSION=$(cat pubspec.yaml | grep 'flutter:' | head -n 1 | awk '{ print $2 }' | tr -d '"' | cut -d "=" -f 2)
          echo "FLUTTER_VERSION=${FLUTTER_VERSION}" >> $GITHUB_ENV
          echo "Detected Flutter version: ${FLUTTER_VERSION}"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Env
        run: dart ./scripts/setup_env.dart

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Get Flutter Deps
        run: flutter pub get --suppress-analytics

      # - name: Test (temporarily disabled)
        # run: flutter test

      - name: Build APK (debug - no signing key needed)
        run: |
          set -eux
          BUILD_NUM=$(git rev-list --count HEAD)
          echo "Build Number: $BUILD_NUM"

          flutter clean
          flutter pub get

          # 使用 debug 模式构建（不需要签名密钥）
          flutter build apk --debug --flavor dev \
            --build-number="$BUILD_NUM"

      - name: Verify APK Contents
        run: |
          echo "=== Verifying APK contents ==="
          APK_DIR="build/app/outputs/flutter-apk"
          ls -la $APK_DIR/

          for apk in $APK_DIR/*.apk; do
            echo "--- Checking: $apk ---"
            unzip -l "$apk" | grep -E "(libflutter\.so|lib/arm)" || echo "No native libs found in $apk"
          done

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitJournal-Debug-APK
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30
