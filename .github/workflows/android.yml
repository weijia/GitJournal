name: Android
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  GO_VERSION: '1.21'
  GO_GIT_DART_REPO: 'weijia/go_git_dart'

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Give more Disk Space
        run: sudo rm -rf /usr/share/dotnet

      - name: Checkout GitJournal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Get Flutter version from pubspec
        run: |
          set -e
          FLUTTER_VERSION=$(cat pubspec.yaml | grep 'flutter:' | head -n 1 | awk '{ print $2 }' | tr -d '"' | cut -d "=" -f 2)
          echo "FLUTTER_VERSION=${FLUTTER_VERSION}" >> $GITHUB_ENV
          echo "Detected Flutter version: ${FLUTTER_VERSION}"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Env
        run: dart ./scripts/setup_env.dart

      - name: Verify go_git_dart dependency
        run: dart ./scripts/verify_go_git_dart.dart

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Get Flutter Deps
        run: flutter pub get --suppress-analytics

      # ============================================
      # Build custom go_git_dart with malformed mode fix
      # ============================================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Checkout forked go_git_dart
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GO_GIT_DART_REPO }}
          path: go_git_dart_fork
          fetch-depth: 0

      - name: Build go_git_dart Android binaries
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -eux
          echo "=== Building go_git_dart Android binaries ==="
          echo "NDK Path: $ANDROID_NDK_HOME"
          echo "Go version: $(go version)"

          cd go_git_dart_fork/src

          NDK_TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          if [ ! -d "$NDK_TOOLCHAIN" ]; then
            echo "ERROR: NDK toolchain not found at $NDK_TOOLCHAIN"
            ls -la $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/ || true
            exit 1
          fi

          mkdir -p ../android/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86,x86_64}

          export GOOS=android
          export CGO_ENABLED=1
          ANDROID_SDK_VERSION=21

          echo "Building for arm64-v8a..."
          GOARCH=arm64 CC="$NDK_TOOLCHAIN/bin/aarch64-linux-android${ANDROID_SDK_VERSION}-clang" \
            go build -buildmode=c-shared -trimpath -o ../android/src/main/jniLibs/arm64-v8a/go_git_dart.so .

          echo "Building for armeabi-v7a..."
          GOARCH=arm CC="$NDK_TOOLCHAIN/bin/armv7a-linux-androideabi${ANDROID_SDK_VERSION}-clang" \
            go build -buildmode=c-shared -trimpath -o ../android/src/main/jniLibs/armeabi-v7a/go_git_dart.so .

          echo "Building for x86..."
          GOARCH=386 CC="$NDK_TOOLCHAIN/bin/i686-linux-android${ANDROID_SDK_VERSION}-clang" \
            go build -buildmode=c-shared -trimpath -o ../android/src/main/jniLibs/x86/go_git_dart.so .

          echo "Building for x86_64..."
          GOARCH=amd64 CC="$NDK_TOOLCHAIN/bin/x86_64-linux-android${ANDROID_SDK_VERSION}-clang" \
            go build -buildmode=c-shared -trimpath -o ../android/src/main/jniLibs/x86_64/go_git_dart.so .

          echo "=== Build complete ==="
          find ../android/src/main/jniLibs -name "*.so" -exec ls -lh {} \;

      - name: Replace go_git_dart binaries everywhere
        run: |
          echo "=== Replacing go_git_dart binaries in all cache locations ==="

          CUSTOM_LIBS="$GITHUB_WORKSPACE/go_git_dart_fork/android/src/main/jniLibs"
          echo "Custom libs: $CUSTOM_LIBS"
          ls -la $CUSTOM_LIBS/*/

          replaced=0

          # Method 1: Search pub cache
          for dir in "$HOME/.pub-cache" "$PUB_CACHE" "$GITHUB_WORKSPACE/.dart_tool/pub-cache"; do
            echo "Scanning: $dir"
            while IFS= read -r target; do
              if [ -d "$target/android/src/main/jniLibs" ]; then
                echo "  Found jniLibs at: $target/android/src/main/jniLibs"
                rm -rf "$target/android/src/main/jniLibs"
                cp -r "$CUSTOM_LIBS" "$target/android/src/main/jniLibs"
                echo "  ✓ Replaced!"
                replaced=$((replaced + 1))
              fi
            done < <(find "$dir" -type d -name "go_git_dart" 2>/dev/null)
          done

          # Method 2: Also search for any path containing go_git_dart with jniLibs
          # Skip the source directory (go_git_dart_fork) to avoid self-replacement error
          while IFS= read -r jniDir; do
            # Skip if this is the source directory
            if [[ "$jniDir" == *"go_git_dart_fork"* ]]; then
              echo "  Skipping source directory: $jniDir"
              continue
            fi
            echo "  Found jniLibs at: $jniDir"
            rm -rf "$jniDir"
            parent=$(dirname "$jniDir")
            cp -r "$CUSTOM_LIBS" "$parent/jniLibs"
            echo "  ✓ Replaced!"
            replaced=$((replaced + 1))
          done < <(find / -type d -path "*/go_git_dart*/android/src/main/jniLibs" 2>/dev/null | grep -v "go_git_dart_fork")

          echo "=== Total replacements: $replaced ==="
          if [ "$replaced" -eq 0 ]; then
            echo "WARNING: No jniLibs directories found to replace!"
            echo "Listing all go_git_dart directories:"
            find / -type d -name "go_git_dart" 2>/dev/null || true
          fi

      - name: Decode debug keystore
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > android/app/debug-keystore.jks
          ls -la android/app/debug-keystore.jks

      - name: Build APK
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: |
          set -eux
          BUILD_NUM=$(git rev-list --count HEAD)
          echo "Build Number: $BUILD_NUM"

          flutter clean
          flutter pub get --suppress-analytics

          # Re-replace binaries after flutter clean + pub get
          echo "=== Re-replacing go_git_dart binaries after flutter clean ==="
          CUSTOM_LIBS="$GITHUB_WORKSPACE/go_git_dart_fork/android/src/main/jniLibs"
          replaced=0
          while IFS= read -r target; do
            if [ -d "$target/android/src/main/jniLibs" ]; then
              echo "  Replacing: $target/android/src/main/jniLibs"
              rm -rf "$target/android/src/main/jniLibs"
              cp -r "$CUSTOM_LIBS" "$target/android/src/main/jniLibs"
              replaced=$((replaced + 1))
            fi
          done < <(find "$HOME/.pub-cache" "$GITHUB_WORKSPACE/.dart_tool" -type d -name "go_git_dart" 2>/dev/null)
          echo "Re-replaced $replaced locations"

          flutter build apk --debug --flavor dev \
            --build-number="$BUILD_NUM"

      - name: Verify APK Contents
        run: |
          echo "=== Verifying APK contents ==="
          APK_DIR="build/app/outputs/flutter-apk"
          ls -la $APK_DIR/

          for apk in $APK_DIR/*.apk; do
            echo "--- $apk ---"
            unzip -l "$apk" | grep "go_git_dart"
          done

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitJournal-Debug-APK
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30
